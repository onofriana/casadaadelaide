<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0d0a0b;color:var(--branco);font-family:'Cormorant Garamond',serif;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.15;}

.wrap{position:relative;z-index:1;padding:32px 24px 80px;max-width:1100px;margin:0 auto;}

.hero{text-align:center;margin-bottom:36px;}
.hero-label{font-size:.58rem;letter-spacing:.35em;text-transform:uppercase;color:#60d4a0;opacity:.8;margin-bottom:12px;font-family:'Cormorant Garamond',serif;}
.hero-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,6vw,4rem);background:linear-gradient(135deg,#60d4a0,var(--ambar-c));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.hero-sub{font-style:italic;font-size:1rem;opacity:.45;max-width:420px;margin:0 auto;line-height:1.6;}

/* PROGRESSO QUADROS */
.quadros-prog{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.qp-dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-size:.65rem;font-weight:600;color:rgba(255,255,255,.25);transition:all .3s;cursor:default;}
.qp-dot.feito{border-color:#60d4a0;background:rgba(96,212,160,.2);color:#60d4a0;}
.qp-dot.atual{border-color:var(--ambar-c);background:rgba(240,168,48,.15);color:var(--ambar-c);}

/* TEMA DO QUADRO */
.quadro-tema{text-align:center;margin-bottom:20px;}
.tema-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;border-radius:20px;font-family:'Fredoka',sans-serif;font-size:.78rem;font-weight:500;}
.tema-desc{font-style:italic;font-size:.88rem;opacity:.4;margin-top:6px;}

/* LAYOUT JOGO */
.jogo-layout{display:grid;grid-template-columns:1fr 240px;gap:28px;align-items:start;}

/* GRELHA */
.grelha-wrap{overflow-x:auto;}
.grelha{display:inline-grid;gap:3px;user-select:none;}
.cell{
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka',sans-serif;font-size:.9rem;font-weight:500;
  color:var(--branco);cursor:pointer;
  border:1px solid rgba(255,255,255,.04);
  border-radius:4px;
  transition:background .12s,color .12s,border-color .12s;
  text-transform:uppercase;
}
.cell:hover{background:rgba(96,212,160,.12);border-color:rgba(96,212,160,.25);}
.cell.sel{background:rgba(240,168,48,.2);border-color:var(--ambar-c);color:var(--ambar-c);}
.cell.found1{background:rgba(96,212,160,.2);border-color:#60d4a0;color:#60d4a0;}
.cell.found2{background:rgba(240,168,48,.2);border-color:var(--ambar-c);color:var(--ambar-c);}
.cell.found3{background:rgba(168,96,212,.2);border-color:#a060d4;color:#a060d4;}
.cell.found4{background:rgba(212,96,96,.2);border-color:#d46060;color:#d46060;}
.cell.found5{background:rgba(96,168,212,.2);border-color:#60a8d4;color:#60a8d4;}
.cell.found6{background:rgba(212,168,96,.2);border-color:#d4a860;color:#d4a860;}
.cell.found7{background:rgba(96,212,168,.2);border-color:#60d4a8;color:#60d4a8;}
.cell.found8{background:rgba(212,96,168,.2);border-color:#d460a8;color:#d460a8;}
.cell.found9{background:rgba(168,212,96,.2);border-color:#a8d460;color:#a8d460;}
.cell.found10{background:rgba(96,96,212,.2);border-color:#6060d4;color:#6060d4;}

/* PAINEL PALAVRAS */
.palavras-panel{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:20px 18px;}
.palavras-titulo{font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:#60d4a0;opacity:.6;margin-bottom:16px;font-family:'Cormorant Garamond',serif;}
.palavra-item{font-family:'Fredoka',sans-serif;font-size:.82rem;font-weight:400;color:var(--branco);opacity:.6;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);transition:opacity .3s,color .3s;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:6px;}
.palavra-item:last-child{border-bottom:none;}
.palavra-item.enc{opacity:.9;text-decoration:line-through;text-decoration-color:rgba(96,212,160,.5);}
.palavra-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.15);}
.prog-palavras{margin-top:14px;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;opacity:.3;font-family:'Cormorant Garamond',serif;}

/* MSG SUCESSO */
.msg-quadro{
  margin-top:20px;text-align:center;
  background:rgba(96,212,160,.08);border:1px solid rgba(96,212,160,.25);
  border-radius:12px;padding:24px;
  display:none;
}
.msg-quadro.vis{display:block;}
.msg-quadro h3{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#60d4a0;margin-bottom:8px;}
.msg-quadro p{font-style:italic;font-size:.92rem;opacity:.55;margin-bottom:16px;line-height:1.6;}
.btn-prox-quadro{font-family:'Fredoka',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#0d0a0b;background:#60d4a0;border:none;padding:11px 24px;border-radius:8px;cursor:pointer;transition:background .3s;}
.btn-prox-quadro:hover{background:#45c490;}

/* MSG FINAL */
.msg-final{
  text-align:center;max-width:480px;margin:40px auto 0;
  display:none;
}
.msg-final.vis{display:block;}
.msg-final h2{font-family:'Fredoka One',cursive;font-size:2.5rem;background:linear-gradient(135deg,#60d4a0,var(--ambar-c));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;}
.msg-final p{font-style:italic;font-size:1.05rem;opacity:.55;margin-bottom:24px;line-height:1.7;}
.btn-recomecar{font-family:'Fredoka',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#0d0a0b;background:var(--ambar-c);border:none;padding:12px 28px;border-radius:8px;cursor:pointer;transition:background .3s;}
.btn-recomecar:hover{background:var(--ambar);}

footer{position:relative;z-index:1;border-top:1px solid rgba(107,16,32,.2);padding:32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
.f-logo{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--ambar-c);text-decoration:none;}
.f-ono{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--vinho-c);opacity:.5;text-decoration:none;transition:opacity .3s;font-family:'Cormorant Garamond',serif;}
.f-ono:hover{opacity:.9;}

@media(max-width:700px){.jogo-layout{grid-template-columns:1fr;}.cell{width:26px;height:26px;font-size:.72rem;}}

var LETRAS_ALT = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
var quadroActual = 0;
var feitos = [];
var grid = [];
var selInicio = null;
var encontradas = {};
var totalEnc = 0;

function letraAleat(){ return LETRAS_ALT[Math.floor(Math.random()*LETRAS_ALT.length)]; }

function construirGrid(quadro) {
  var N = quadro.N;
  grid = [];
  for(var r=0;r<N;r++){ grid.push([]); for(var c=0;c<N;c++) grid[r].push(''); }
  quadro.posicoes.forEach(function(entry){
    var w = entry.p;
    entry.cells.forEach(function(rc,i){ grid[rc[0]][rc[1]] = w[i]; });
  });
  for(var r=0;r<N;r++) for(var c=0;c<N;c++) if(!grid[r][c]) grid[r][c]=letraAleat();
}

  el.innerHTML = QUADROS.map(function(q,i){
    var cls = 'qp-dot';
    if(feitos.indexOf(i)!==-1) cls+=' feito';
    else if(i===quadroActual) cls+=' atual';
    return '<div class="'+cls+'">'+(i+1)+'</div>';
  }).join('');
}

function renderTema() {
  var q = QUADROS[quadroActual];
  var badge = document.getElementById('tema-badge');
  badge.textContent = q.tema;
  badge.style.background = q.cor;
  badge.style.border = '1px solid ' + q.borda;
  badge.style.color = q.borda.replace('var(--ambar-c)','#f0a830');
  document.getElementById('tema-desc').textContent = q.desc;
}

function renderGrelha() {
  var q = QUADROS[quadroActual];
  var N = q.N;
  var el = document.getElementById('grelha');
  el.style.gridTemplateColumns = 'repeat('+N+',1fr)';
  el.innerHTML = '';
  for(var r=0;r<N;r++){
    for(var c=0;c<N;c++){
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = grid[r][c];
      cell.dataset.r = r; cell.dataset.c = c;
      cell.addEventListener('click', clicarCell);
      el.appendChild(cell);
    }
  }
}

function renderLista() {
  var q = QUADROS[quadroActual];
  var el = document.getElementById('lista-palavras');
  var cores = ['found1','found2','found3','found4','found5','found6','found7','found8','found9','found10'];
  el.innerHTML = q.palavras.map(function(p,i){
    var enc = !!encontradas[p];
    return '<div class="palavra-item'+(enc?' enc':'')+'"><span class="dot" style="background:'+(enc?'currentColor':'rgba(255,255,255,.15)')+'"></span>'+p+'</div>';
  }).join('');
  document.getElementById('prog-palavras').textContent = totalEnc + ' de ' + q.palavras.length + ' encontrada' + (totalEnc!==1?'s':'');
}

function celulasEntre(r1,c1,r2,c2){
  var cells=[],dr=0,dc=0;
  if(r2>r1)dr=1;else if(r2<r1)dr=-1;
  if(c2>c1)dc=1;else if(c2<c1)dc=-1;
  var r=r1,c=c1;
  while(true){ cells.push([r,c]); if(r===r2&&c===c2)break; r+=dr;c+=dc; if(cells.length>20)break; }
  return cells;
}

function clicarCell(e) {
  var r=parseInt(e.target.dataset.r),c=parseInt(e.target.dataset.c);
  if(!selInicio){ selInicio=[r,c]; e.target.classList.add('sel'); return; }
  var cells=celulasEntre(selInicio[0],selInicio[1],r,c);
  var texto=cells.map(function(rc){return grid[rc[0]][rc[1]];}).join('');
  var textoRev=texto.split('').reverse().join('');
  document.querySelectorAll('.cell.sel').forEach(function(el){el.classList.remove('sel');});
  var q=QUADROS[quadroActual];
  var match=null, matchIdx=-1;
  q.palavras.forEach(function(p,i){
    if(!encontradas[p]&&(texto===p||textoRev===p)){ match=p; matchIdx=i; }
  });
  if(match){
    encontradas[match]=true; totalEnc++;
    var corClass='found'+(matchIdx+1);
    cells.forEach(function(rc){
      var idx=rc[0]*q.N+rc[1];
      document.querySelectorAll('.cell')[idx].className='cell '+corClass;
    });
    renderLista();
    if(totalEnc===q.palavras.length) setTimeout(mostrarSucesso,400);
  }
  selInicio=null;
}

function mostrarSucesso(){
  var q=QUADROS[quadroActual];
  var msg=document.getElementById('msg-quadro');
  document.getElementById('msg-quadro-h').textContent=q.msg;
  var frases=[
    'Passas ao quadro seguinte!',
    'Continua — o fado tem muito mais para descobrir.',
    'Cada palavra é uma porta para o fado.',
    'Excelente! O fado agradece.'
  ];
  document.getElementById('msg-quadro-p').textContent=frases[quadroActual%frases.length];
  msg.classList.add('vis');
  if(quadroActual===QUADROS.length-1){
    document.getElementById('btn-prox-quadro').textContent='Ver resultado final →';
  }
}

function proximoQuadro(){
  feitos.push(quadroActual);
  if(quadroActual===QUADROS.length-1){
    document.getElementById('jogo-layout').style.display='none';
    document.getElementById('msg-quadro').classList.remove('vis');
    document.getElementById('msg-final').classList.add('vis');
    renderProg();
    return;
  }
  quadroActual++;
  carregarQuadro();
}

function carregarQuadro(){
  var q=QUADROS[quadroActual];
  encontradas={}; totalEnc=0; selInicio=null;
  construirGrid(q);
  document.getElementById('msg-quadro').classList.remove('vis');
  document.getElementById('jogo-layout').style.display='grid';
  document.getElementById('msg-final').classList.remove('vis');
  renderProg(); renderTema(); renderGrelha(); renderLista();
}

function recomecar(){
  quadroActual=0; feitos=[];
  carregarQuadro();
}

document.getElementById('btn-prox-quadro').addEventListener('click',proximoQuadro);
carregarQuadro();
</script>
</body>
</html>
